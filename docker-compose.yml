# docker-compose.yml — production compose for the admin/platform console.
# Lives inside this repo so CI can scp it straight from the checkout
# (see .github/workflows/docker-deploy.yml). Same reasoning as
# soulthreadktm/docker-compose.yml: talks to the API over the shared Docker
# network instead of round-tripping through Vercel + the public internet.
#
# First-time setup on the VPS (CI only ever scps this file, not the .env):
#   mkdir -p ~/soul-thread-admin && cd ~/soul-thread-admin
#   cp .env.production.example .env   # fill in real values
#   docker compose up -d --build admin   # first run, before CI exists/works
#
# Normal deploys after that go through .github/workflows/docker-deploy.yml.

services:
  admin:
    build:
      context: .
      args:
        NEXT_PUBLIC_PLATFORM_DOMAIN: ${NEXT_PUBLIC_PLATFORM_DOMAIN:-bikribazaar.com}
        NEXT_PUBLIC_PLATFORM_NAME: ${NEXT_PUBLIC_PLATFORM_NAME:-Bikri Bazaar}
        NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
    # GitHub Actions pushes to GHCR; VPS runs `docker compose pull admin` to fetch it.
    image: ghcr.io/rohitsthaa/soul-thread-admin:latest
    container_name: soul-thread-admin
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: production
      PORT: 3002
      # Server-side fetches go straight to the API container over the shared
      # Docker network.
      API_BASE_URL: http://bikribazaar-api:3001
      API_INTERNAL_TOKEN: ${API_INTERNAL_TOKEN:?API_INTERNAL_TOKEN is required — must match bikribazaar-api's value}
      REVALIDATE_SECRET: ${REVALIDATE_SECRET:?REVALIDATE_SECRET is required — must match the storefront's value}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      NEXT_PUBLIC_PLATFORM_DOMAIN: ${NEXT_PUBLIC_PLATFORM_DOMAIN:-bikribazaar.com}
      NEXT_PUBLIC_PLATFORM_NAME: ${NEXT_PUBLIC_PLATFORM_NAME:-Bikri Bazaar}
      NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
    networks:
      - helloworldnepal-net
    healthcheck:
      # 127.0.0.1, not localhost — see soulthreadktm/docker-compose.yml for
      # the full explanation (IPv6 "localhost" resolution vs IPv4-only bind).
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3002/"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  helloworldnepal-net:
    external: true
