name: Admin — Build & Deploy (self-hosted)

# Auto-deploys on every push to main, plus manual trigger from the Actions tab.
# If Vercel's native Git integration is still connected in this project's
# dashboard (Settings → Git), disconnect it — it deploys on push independent
# of this file and would keep building stale Vercel deployments alongside this.
on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: rohitsthaa/soul-thread-admin

jobs:
  # ── 1. Typecheck — fast fail before spending time on a Docker build ─────────
  # `npm run lint` is intentionally NOT run here: `next lint` has never been
  # configured in this project (no eslint.config.*/.eslintrc — running it drops
  # into an interactive "how would you like to configure ESLint?" prompt, which
  # would hang every CI run). Add it back once ESLint is actually set up.
  test:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
      # yarn.lock is the tracked lockfile (see .gitignore + Dockerfile) — package-lock.json
      # isn't committed, so `npm ci` has nothing to install from and fails every run.
      - run: corepack enable && yarn install --frozen-lockfile
      - run: npx tsc --noEmit

  # ── 2. Build Docker image and push to GHCR ──────────────────────────────────
  build-push:
    name: Build & Push
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # NEXT_PUBLIC_* vars get baked into the client bundle at build time —
          # set these as repo/environment Variables (not Secrets) in
          # Settings → Secrets and variables → Actions → Variables.
          build-args: |
            NEXT_PUBLIC_PLATFORM_DOMAIN=${{ vars.NEXT_PUBLIC_PLATFORM_DOMAIN || 'bikribazaar.com' }}
            NEXT_PUBLIC_PLATFORM_NAME=${{ vars.NEXT_PUBLIC_PLATFORM_NAME || 'Bikri Bazaar' }}
            NEXT_PUBLIC_SENTRY_DSN=${{ vars.NEXT_PUBLIC_SENTRY_DSN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 3. SSH into VPS and redeploy ─────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    needs: build-push
    runs-on: ubuntu-latest
    environment: Production

    steps:
      - uses: actions/checkout@v4

      - name: Copy docker-compose.yml to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT || 22 }}
          source: docker-compose.yml
          # Must be its own directory, distinct from bikribazaar-api's and
          # soulthreadktm's VPS_DEPLOY_PATH — needs its own .env already in
          # place (copied from .env.production.example, not scp'd here).
          target: ${{ secrets.VPS_DEPLOY_PATH }}

      - name: SSH — pull new image and restart
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e

            cd ${{ secrets.VPS_DEPLOY_PATH }}

            docker compose pull admin
            docker compose up -d --no-deps admin
            docker image prune -f

            echo "Deploy complete."
